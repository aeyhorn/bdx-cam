services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cam_feedback
    ports:
      - "5432:5432"
    volumes:
      - cam_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cam_feedback"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/cam_feedback
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      UPLOAD_DIR: /data/uploads
      SYSTEM_BUILD_AUTOINCREMENT_ON_STARTUP: ${SYSTEM_BUILD_AUTOINCREMENT_ON_STARTUP:-true}
      SYSTEM_BUILD_FORCE_INCREMENT: ${SYSTEM_BUILD_FORCE_INCREMENT:-true}
      SYSTEM_BUILD_STARTUP_SPECS: ${SYSTEM_BUILD_STARTUP_SPECS:-backend-api:0.1.0;frontend-web:0.1.0;post-library:1.0.0}
    ports:
      - "8000:8000"
    volumes:
      - cam_uploads:/data/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 120s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cam_pg_data:
  cam_uploads:
